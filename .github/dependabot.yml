# Dependabot — npm workspaces (root + living sandboxes)
# Review PRs with: npm run msc:lint && npm run grade && npm run msc:test:root

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /examples/nextjs-minimal
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /examples/nextjs-payload
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
